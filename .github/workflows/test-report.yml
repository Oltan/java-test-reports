name: Test Report Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1-5'

env:
  JAVA_VERSION: '21'
  PYTHON_VERSION: '3.12'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r fastapi-server/requirements.txt

      - name: Run Java tests
        run: |
          mvn -B test -pl test-core,jira-service,email-service,doors-service,report-model,allure-integration,javalin-server,orchestrator

      - name: Run Python tests
        run: |
          cd fastapi-server && python3 -m pytest tests/ -v

      - name: Generate Allure report
        run: |
          allure generate --clean test-core/target/allure-results -o allure-report

      - name: Upload Allure report artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-core/target/surefire-reports
            **/target/surefire-reports
          retention-days: 14
