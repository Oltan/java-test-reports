<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="run-id" content="{{ run_id }}">
  <meta name="jira-base-url" content="{{ jira_base_url }}">
  <title>Triage — {{ run_id }}</title>
  <link rel="stylesheet" href="/static/dashboard.css">
  <style>
    .triage-auth-wrap {
      display: flex; justify-content: center; align-items: center;
      min-height: calc(100vh - 56px); padding: var(--sp-6);
      background: radial-gradient(ellipse at 50% 0%, var(--heat-accent-muted) 0%, transparent 60%);
    }
    .triage-auth-card {
      background: var(--surface); border-radius: var(--radius-lg); padding: var(--sp-10) var(--sp-8);
      box-shadow: var(--shadow-lg); width: 100%; max-width: 400px;
      border: 1px solid var(--border);
    }
    .triage-auth-card h2 { text-align: center; font-size: 20px; font-weight: 700; margin-bottom: var(--sp-6); letter-spacing: -.02em; }
    .triage-auth-icon { text-align: center; margin-bottom: var(--sp-4); color: var(--accent); }
    .triage-auth-error { color: var(--danger); font-size: 13px; min-height: 20px; margin-bottom: var(--sp-2); text-align: center; }

    .triage-loading {
      text-align: center; padding: var(--sp-16) var(--sp-6); color: var(--text-muted);
    }
    .triage-loading h2 { font-size: 20px; color: var(--text); margin-bottom: var(--sp-2); }

    .fcard[data-decision="accepted_pass"] { border-left: 4px solid var(--success); }
    .fcard[data-decision="accepted_skip"] { border-left: 4px solid var(--skip); }
    .fcard[data-decision="jira_created"],
    .fcard[data-decision="jira_linked"] { border-left: 4px solid var(--warning); }

    .fcard-meta-row {
      display: flex; flex-wrap: wrap; gap: var(--sp-2); margin-bottom: var(--sp-3);
      align-items: center;
    }
    .fcard-meta-tag {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 700;
      letter-spacing: .3px;
    }
    .fcard-meta-tag--doors {
      background: rgba(139,92,246,.12); color: #a78bfa;
    }
    .fcard-meta-tag--flaky {
      background: var(--warning-bg); color: var(--warning);
      animation: pulse-flaky 2s ease-in-out infinite;
    }
    .fcard-meta-tag--retry {
      background: var(--skip-bg); color: var(--text-secondary);
    }
    @keyframes pulse-flaky {
      0%, 100% { opacity: 1; }
      50% { opacity: .7; }
    }

    .triage-actions {
      display: flex; flex-wrap: wrap; gap: var(--sp-2); align-items: flex-start;
      margin-top: var(--sp-4); padding-top: var(--sp-4); border-top: 1px solid var(--border);
    }
    .triage-actions-group {
      display: flex; gap: var(--sp-2); align-items: center;
    }
    .triage-actions-divider {
      width: 1px; height: 28px; background: var(--border); margin: 0 var(--sp-1);
    }

    .override-section {
      margin-top: var(--sp-3); padding: var(--sp-4);
      background: var(--bg); border-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }
    .override-section[hidden] { display: none; }
    .override-label {
      font-size: 12px; font-weight: 700; color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: .5px; margin-bottom: var(--sp-2);
      display: block;
    }
    .override-reason {
      width: 100%; min-height: 60px; background: var(--surface);
      border: 1px solid var(--border); color: var(--text);
      padding: var(--sp-3); border-radius: var(--radius-sm);
      font-family: var(--font-body); font-size: 14px; resize: vertical;
      outline: none; transition: border-color var(--duration), box-shadow var(--duration);
    }
    .override-reason:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-muted); }
    .override-reason::placeholder { color: var(--text-muted); opacity: .5; }
    .override-reason--error { border-color: var(--danger); box-shadow: 0 0 0 3px var(--danger-bg); }
    .override-error {
      color: var(--danger); font-size: 12px; margin-top: var(--sp-1);
      min-height: 18px;
    }
    .override-actions {
      display: flex; gap: var(--sp-2); margin-top: var(--sp-3);
    }

    .link-jira-section {
      margin-top: var(--sp-3); padding: var(--sp-4);
      background: var(--bg); border-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }
    .link-jira-section[hidden] { display: none; }
    .link-jira-row {
      display: flex; gap: var(--sp-2); align-items: center;
    }
    .link-jira-input {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      color: var(--text); padding: var(--sp-2) var(--sp-3);
      border-radius: var(--radius-sm); font-family: var(--font-mono); font-size: 14px;
      outline: none; transition: border-color var(--duration), box-shadow var(--duration);
    }
    .link-jira-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-muted); }
    .link-jira-input::placeholder { color: var(--text-muted); opacity: .5; }

    .decision-badge {
      display: inline-flex; align-items: center; gap: var(--sp-2);
      padding: var(--sp-2) var(--sp-4); border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 600;
    }
    .decision-badge--pass { background: var(--success-bg); color: var(--success); }
    .decision-badge--skip { background: var(--skip-bg); color: var(--skip); }
    .decision-badge--jira { background: var(--warning-bg); color: var(--warning); }

    .decision-info {
      margin-top: var(--sp-2); font-size: 12px; color: var(--text-muted);
    }
    .decision-info strong { color: var(--text-secondary); }

    .filter-search-wrap {
      display: flex; align-items: center; gap: var(--sp-2); background: var(--bg);
      border: 1px solid var(--border); border-radius: var(--radius-sm); padding: var(--sp-2) var(--sp-3);
      transition: border-color var(--duration);
    }
    .filter-search-wrap:focus-within { border-color: var(--accent); }
    .filter-search-wrap svg { color: var(--text-muted); flex-shrink: 0; }
    .filter-search {
      background: none; border: none; color: var(--text); font-size: 14px;
      font-family: var(--font-body); outline: none; width: 220px;
    }
    .filter-search::placeholder { color: var(--text-muted); opacity: .6; }
  </style>
</head>
<body>

<!-- ── Nav ── -->
<nav class="nav">
  <div class="nav-brand">
    <a href="/" class="nav-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Test Reports
  </div>
  <div class="nav-right">
    <span class="nav-label nav-label--muted">Run: {{ run_id }}</span>
  </div>
</nav>

<!-- ── Auth Gate ── -->
<div id="triage-auth" class="triage-auth-wrap">
  <div class="triage-auth-card">
    <div class="triage-auth-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h2>Triage Erişimi</h2>
    <form id="triage-login-form">
      <div class="field">
        <label for="triage-username">Kullanıcı Adı</label>
        <input id="triage-username" name="username" type="text" placeholder="admin" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="triage-password">Şifre</label>
        <input id="triage-password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <div class="triage-auth-error" id="triage-auth-error"></div>
      <button class="btn btn-primary btn-block" type="submit">Giriş Yap</button>
    </form>
  </div>
</div>

<!-- ── Header ── -->
<header class="triage-header" id="triage-header" style="display:none">
  <div class="triage-header-inner">
    <div>
      <h1 class="triage-title">Failure Analysis</h1>
      <p class="triage-sub" id="triage-sub"></p>
    </div>
    <div class="triage-stats" id="triage-stats"></div>
  </div>
</header>

<!-- ── Filter bar ── -->
<div class="filter-bar" id="triage-filter" style="display:none">
  <div class="filter-inner">
    <div class="filter-search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="filter-input" class="filter-search" type="text" placeholder="Senaryo ara…">
    </div>
    <span class="filter-count">
      <span id="visible-count">0</span> failure(s)
    </span>
  </div>
</div>

<!-- ── Loading ── -->
<div id="triage-loading" class="triage-loading" style="display:none">
  <h2>Yükleniyor…</h2>
  <p>Triaj verileri alınıyor</p>
</div>

<!-- ── Failure cards ── -->
<main class="triage-main" id="triage-main" style="display:none"></main>

<footer class="footer" id="triage-footer" style="display:none">
  Test Raporlama Sistemi v2.0 · <a href="/">Dashboard'a Dön</a>
</footer>

<script type="module" src="/static/triage.js?v=2"></script>
</body>
</html>
