<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Raporlama Sistemi</title>
  <link rel="stylesheet" href="/static/dashboard.css">
</head>
<body>
  <div class="container">
    <!-- HEADER -->
    <div class="header">
      <h1>🧪 Test Raporlama Sistemi</h1>
      <div class="header-right">
        <span id="login-status">🔑 Giriş Yap</span>
      </div>
    </div>

    <!-- LOGIN SECTION (shown when not authenticated) -->
    <div id="login-section" class="login-section">
      <div class="login-card">
        <h3>🔑 Giriş</h3>
        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label for="username">Kullanıcı Adı</label>
            <input type="text" id="username" name="username" placeholder="admin" required autocomplete="username">
          </div>
          <div class="form-group">
            <label for="password">Şifre</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
          </div>
          <div class="login-error" id="loginError"></div>
          <button type="submit" class="btn" id="loginBtn">Giriş Yap</button>
        </form>
      </div>
    </div>

    <!-- DASHBOARD (shown when authenticated) -->
    <div id="dashboard-content" style="display:none">

      <!-- METRIC CARDS -->
      <div class="metrics" id="metrics">
        <div class="metric-card">
          <div class="label">✅ Başarı Oranı</div>
          <div class="value" style="color:var(--success)" id="success-rate">--</div>
        </div>
        <div class="metric-card">
          <div class="label">📊 Toplam Run</div>
          <div class="value" style="color:var(--accent)" id="total-runs">{{ total_runs }}</div>
        </div>
        <div class="metric-card">
          <div class="label">⏱ Ortalama Süre</div>
          <div class="value" style="color:var(--warning)" id="avg-duration">--</div>
        </div>
        <div class="metric-card">
          <div class="label">📈 Trend</div>
          <div class="value" id="trend">--</div>
        </div>
      </div>

      <!-- CHARTS ROW -->
      <div class="charts">
        <div class="chart-box">
          <h3>🍩 Pass/Fail Dağılımı</h3>
          <canvas id="pieChart"></canvas>
        </div>
        <div class="chart-box">
          <h3>📊 Run Bazında Karşılaştırma</h3>
          <canvas id="barChart"></canvas>
        </div>
      </div>

      <!-- RUN TABLE -->
      <div class="run-table">
        <h3>📋 Son Run'lar</h3>
        <table>
          <thead><tr>
            <th>Run ID</th><th>Tarih</th><th>Geçen</th><th>Kalan</th>
            <th>Süre</th><th>Durum</th><th></th>
          </tr></thead>
          <tbody id="run-tbody"></tbody>
        </table>
      </div>

    </div>

    <div class="footer">
      Test Raporlama Sistemi v1.0 · GitHub
    </div>
  </div>

  <script src="/static/chart.min.js"></script>
  <script>
  // ── Auth ──────────────────────────────────────────────────────
  function handleLogin(event) {
    event.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const errorEl = document.getElementById('loginError');
    const btn = document.getElementById('loginBtn');

    errorEl.textContent = '';
    btn.disabled = true;
    btn.textContent = 'Giriş yapılıyor...';

    fetch('/api/v1/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    })
    .then(res => {
      if (!res.ok) throw new Error('Geçersiz kullanıcı adı veya şifre');
      return res.json();
    })
    .then(data => {
      localStorage.setItem('jwt_token', data.token);
      showDashboard(data.token);
    })
    .catch(err => {
      errorEl.textContent = err.message;
    })
    .finally(() => {
      btn.disabled = false;
      btn.textContent = 'Giriş Yap';
    });
  }

  function showDashboard(token) {
    document.getElementById('login-section').style.display = 'none';
    document.getElementById('dashboard-content').style.display = 'block';
    document.getElementById('login-status').innerHTML =
      '✅ Giriş yapıldı · <a href="#" onclick="logout()" style="color:var(--danger)">Çıkış</a>';
    loadData(token);
  }

  function logout() {
    localStorage.removeItem('jwt_token');
    location.reload();
  }

  // ── Data Loading ──────────────────────────────────────────────
  async function loadData(token) {
    try {
      const resp = await fetch('/api/v1/runs', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (!resp.ok) {
        console.error('API error:', resp.status);
        return;
      }
      const runs = await resp.json();
      if (!runs || runs.length === 0) return;

      renderMetrics(runs);
      renderPieChart(runs[0]);
      renderBarChart(runs);
      renderTable(runs);
    } catch(e) {
      console.error('Failed to load data:', e);
    }
  }

  // ── Metrics ───────────────────────────────────────────────────
  function renderMetrics(runs) {
    const total = runs.length;
    const latest = runs[0];
    const successRate = latest ? Math.round(latest.passed / latest.totalScenarios * 100) : 0;
    document.getElementById('success-rate').textContent = successRate + '%';
    document.getElementById('total-runs').textContent = total;
    const avgDur = runs.length > 0
      ? (runs.reduce((s, r) => s + parseFloat(r.duration || '0'), 0) / runs.length).toFixed(1)
      : 0;
    document.getElementById('avg-duration').textContent = avgDur + 's';

    // Trend: compare last 2 runs
    const trend = runs.length >= 2
      ? (runs[0].passed / runs[0].totalScenarios - runs[1].passed / runs[1].totalScenarios) * 100
      : 0;
    const trendEl = document.getElementById('trend');
    trendEl.textContent = (trend >= 0 ? '📈 +' : '📉 ') + Math.abs(trend).toFixed(1) + '%';
    trendEl.style.color = trend >= 0 ? 'var(--success)' : 'var(--danger)';
  }

  // ── Pie Chart ─────────────────────────────────────────────────
  function renderPieChart(run) {
    if (!run) return;
    new Chart(document.getElementById('pieChart'), {
      type: 'doughnut',
      data: {
        labels: ['✅ Passed', '❌ Failed', '⏭ Skipped'],
        datasets: [{
          data: [run.passed, run.failed, run.skipped],
          backgroundColor: ['#16a34a', '#dc2626', '#64748b'],
          borderColor: '#1e293b',
          borderWidth: 2
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            position: 'bottom',
            labels: { color: '#e2e8f0', padding: 16, font: { size: 13 } }
          }
        }
      }
    });
  }

  // ── Bar Chart ─────────────────────────────────────────────────
  function renderBarChart(runs) {
    const sorted = [...runs].reverse().slice(-10);
    new Chart(document.getElementById('barChart'), {
      type: 'bar',
      data: {
        labels: sorted.map(r => r.runId.slice(-8)),
        datasets: [
          { label: '✅ Passed', data: sorted.map(r => r.passed), backgroundColor: '#16a34a', borderRadius: 4 },
          { label: '❌ Failed', data: sorted.map(r => r.failed), backgroundColor: '#dc2626', borderRadius: 4 },
          { label: '⏭ Skipped', data: sorted.map(r => r.skipped), backgroundColor: '#64748b', borderRadius: 4 }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: '#e2e8f0', font: { size: 12 } } }
        },
        scales: {
          x: { stacked: true, ticks: { color: '#94a3b8' }, grid: { display: false } },
          y: { stacked: true, ticks: { color: '#94a3b8' }, grid: { color: '#334155' } }
        }
      }
    });
  }

  // ── Run Table ─────────────────────────────────────────────────
  function renderTable(runs) {
    const tbody = document.getElementById('run-tbody');
    tbody.innerHTML = runs.slice(0, 10).map(r => `
      <tr>
        <td><a href="/reports/${r.runId}/triage" style="color:var(--accent)">${r.runId.slice(0, 20)}</a></td>
        <td>${new Date(r.timestamp).toLocaleDateString('tr-TR')}</td>
        <td><span class="badge badge-pass">${r.passed}</span></td>
        <td><span class="badge badge-fail">${r.failed}</span></td>
        <td>${r.duration}</td>
        <td>${r.failed === 0 ? '✅' : '❌'}</td>
        <td><a href="/reports/${r.runId}/triage">Detay →</a></td>
      </tr>
    `).join('');
  }

  // ── Init ──────────────────────────────────────────────────────
  (function() {
    const token = localStorage.getItem('jwt_token');
    if (token) {
      // Verify token is still valid
      fetch('/api/v1/runs', {
        headers: { 'Authorization': 'Bearer ' + token }
      })
      .then(res => {
        if (res.ok) {
          showDashboard(token);
        } else {
          localStorage.removeItem('jwt_token');
        }
      })
      .catch(() => {
        localStorage.removeItem('jwt_token');
      });
    }
  })();
  </script>
</body>
</html>
