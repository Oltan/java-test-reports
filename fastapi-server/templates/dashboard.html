<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Raporlama Sistemi</title>
  <link rel="stylesheet" href="/static/dashboard.css?v=3">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
</head>
<body>

<nav class="nav">
  <div class="nav-brand">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Test Reports
  </div>
  <div class="nav-links" id="nav-links" style="display:none">
    <a href="/dashboard" class="nav-link active">Dashboard</a>
    <a href="/reports/merge" class="nav-link">Raporlar</a>
    <a href="/admin" class="nav-link">Admin</a>
  </div>
  <div class="nav-right" id="nav-right">
    <button class="theme-toggle" id="theme-toggle" title="Tema değiştir">
      <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
    <span class="nav-label" id="nav-label"></span>
    <button class="nav-btn" id="logout-btn" style="display:none" onclick="void 0">Çıkış Yap</button>
  </div>
</nav>

<div id="login-section" class="login-wrap">
  <div class="login-card">
    <div class="login-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h2>Giriş Yap</h2>
    <form id="login-form">
      <div class="field">
        <label for="username">Kullanıcı Adı</label>
        <input id="username" name="username" type="text" placeholder="admin" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="password">Şifre</label>
        <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <div class="login-error" id="login-error"></div>
      <button class="btn btn-primary btn-block" type="submit">Giriş Yap</button>
    </form>
  </div>
</div>

<div id="dashboard-content" class="page" style="display:none">

  <div class="filter-bar">
    <div class="filter-inner">
      <div class="filter-group">
        <label class="filter-label" for="version-select">Versiyon</label>
        <select id="version-select" class="filter-select">
          <option value="">Tümü</option>
        </select>
      </div>
      <div class="filter-group">
        <label class="filter-label" for="date-range">Tarih Aralığı</label>
        <div class="date-range-wrap" id="date-range-wrap">
          <input id="date-range" class="filter-date" type="text" placeholder="Tarih seçin...">
        </div>
      </div>
      <div class="filter-group">
        <label class="filter-label" for="status-filter">Durum</label>
        <select id="status-filter" class="filter-select">
          <option value="">Tümü</option>
          <option value="passed">Passed</option>
          <option value="failed">Failed</option>
          <option value="skipped">Skipped</option>
        </select>
      </div>
      <button class="btn btn-primary" id="generate-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Rapor Oluştur
      </button>
    </div>
  </div>

  <div class="metrics">
    <div class="metric-card">
      <div class="metric-icon metric-icon--green">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="metric-body">
        <div class="metric-label">Başarı Oranı</div>
        <div class="metric-value" id="metric-rate">—</div>
      </div>
    </div>
    <div class="metric-card">
      <div class="metric-icon metric-icon--blue">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      </div>
      <div class="metric-body">
        <div class="metric-label">Toplam Koşu</div>
        <div class="metric-value" id="metric-total">—</div>
      </div>
    </div>
    <div class="metric-card">
      <div class="metric-icon metric-icon--amber">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </div>
      <div class="metric-body">
        <div class="metric-label">Ortalama Süre</div>
        <div class="metric-value" id="metric-avg">—</div>
      </div>
    </div>
    <div class="metric-card">
      <div class="metric-icon metric-icon--violet">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      </div>
      <div class="metric-body">
        <div class="metric-label">Flaky Sayısı</div>
        <div class="metric-value" id="metric-flaky">—</div>
      </div>
    </div>
  </div>

  <div class="charts-row">
    <div class="chart-card chart-card--sm">
      <div class="chart-title">Dağılım</div>
      <div class="chart-body">
        <canvas id="pieChart"></canvas>
      </div>
    </div>
    <div class="chart-card chart-card--lg">
      <div class="chart-title">Versiyon Bazlı Sonuçlar</div>
      <div class="chart-body">
        <canvas id="barChart"></canvas>
      </div>
    </div>
  </div>

  <div class="progress-section" id="progress-section" style="display:none">
    <div class="progress-header">
      <span class="progress-label" id="progress-label">Test çalışıyor…</span>
      <span class="progress-pct" id="progress-pct">0%</span>
    </div>
    <div class="prog-wrap prog-wrap--lg">
      <div class="prog-bar prog-bar--accent" id="progress-bar" style="width:0%"></div>
    </div>
  </div>

  <div class="table-card">
    <div class="table-header">
      <h3 class="table-title">Son Çalıştırmalar</h3>
      <div class="table-search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="table-search" class="table-search" type="text" placeholder="Ara…">
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Run</th>
            <th>Tarih</th>
            <th>Geçen</th>
            <th>Hata</th>
            <th>Skip</th>
            <th>Başarı</th>
            <th>Süre</th>
            <th>Retry</th>
            <th>Deps</th>
            <th>Durum</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="run-tbody"></tbody>
      </table>
    </div>
  </div>

</div>

<footer class="footer">
  Test Raporlama Sistemi v3.0 · Allure + FastAPI
</footer>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/tr.js"></script>
<script type="module" src="/static/vendor.js?v=2"></script>
<script type="module" src="/static/dashboard.js?v=2"></script>
</body>
</html>
