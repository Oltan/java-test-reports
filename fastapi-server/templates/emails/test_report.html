<!DOCTYPE html>
<html><body style="font-family:Arial,sans-serif;max-width:600px;margin:0 auto;">
<h2>Test Raporu</h2>
<p><strong>Tarih:</strong> {{ started_at }}</p>
<p><strong>Sonuç:</strong> <span style="color:{% if passed > failed %}green{% else %}red{% endif %}">
{{ passed }}/{{ total }} PASS</span></p>
<table style="width:100%;border-collapse:collapse;margin-top:20px;">
<tr style="background:#f5f5f5;"><th>Metrik</th><th>Değer</th></tr>
<tr><td>Toplam</td><td>{{ total }}</td></tr>
<tr><td>Başarılı</td><td style="color:green">{{ passed }}</td></tr>
<tr><td>Başarısız</td><td style="color:red">{{ failed }}</td></tr>
<tr><td>Atlanan</td><td>{{ skipped }}</td></tr>
</table>
<p style="margin-top:20px;"><a href="{{ dashboard_url }}">Dashboard'da Görüntüle</a></p>
</body></html>
